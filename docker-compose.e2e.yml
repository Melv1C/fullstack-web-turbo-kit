services:
  test-db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - fullstack-network

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: fullstack-web-backend
    depends_on:
      test-db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - APP_ENV=test
      - DATABASE_URL=postgresql://postgres:postgres@test-db:5432/postgres
    networks:
      - fullstack-network
    restart: unless-stopped
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        - APP_ENV=test
    container_name: fullstack-web-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    networks:
      - fullstack-network
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        - APP_ENV=test
    container_name: fullstack-web-admin
    depends_on:
      - backend
    ports:
      - "5174:80"
    networks:
      - fullstack-network
    restart: unless-stopped

networks:
  fullstack-network:
    driver: bridge
