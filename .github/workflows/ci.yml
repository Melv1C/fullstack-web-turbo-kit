name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - '.github/workflows/ci.yml'
  workflow_call:

jobs:
  ci:
    name: Build & Check
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'bun'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate committed web env files
        run: |
          set -euo pipefail

          files=(
            "apps/frontend/.env.local"
            "apps/frontend/.env.staging"
            "apps/frontend/.env.production"
            "apps/admin/.env.local"
            "apps/admin/.env.staging"
            "apps/admin/.env.production"
          )

          for file in "${files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required env file: $file"
              exit 1
            fi

            if awk -F '=' '
              /^[[:space:]]*($|#)/ { next }
              $1 !~ /^VITE_[A-Z0-9_]+$/ { print; exit 1 }
            ' "$file"; then
              true
            else
              echo "Invalid key found in $file. Only VITE_* keys are allowed."
              exit 1
            fi
          done

      - name: Format check
        run: bun run format:check

      - name: Prisma Validate
        run: bun run prisma:validate

      - name: Prisma Generate
        run: bun run prisma:generate

      - name: Build all packages
        run: bun run build

      - name: Linting
        run: bun run lint
